<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – BetTips Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0f14; color: #e8eaf0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #1e2330; border: 1px solid #2a3045; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .logo { font-size: 32px; }
    .login-logo h1 { font-size: 20px; font-weight: 800; color: #00c853; margin-top: 8px; }
    .login-logo p { font-size: 13px; color: #7a8099; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #7a8099; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    input { width: 100%; background: #161a23; border: 1px solid #2a3045; border-radius: 8px; color: #e8eaf0; padding: 12px 14px; font-size: 14px; outline: none; transition: border-color .2s; }
    input:focus { border-color: #00c853; }
    .btn { width: 100%; background: #00c853; color: #000; font-size: 15px; font-weight: 800; border: none; border-radius: 8px; padding: 14px; cursor: pointer; margin-top: 8px; transition: opacity .2s; }
    .btn:hover { opacity: .9; }
    .error { background: rgba(255,68,68,.1); border: 1px solid rgba(255,68,68,.3); color: #ff4444; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="logo">⚽</div>
      <h1>BetTips Pro</h1>
      <p>Owner Dashboard</p>
    </div>
    {% if messages %}
      {% for message in messages %}
      <div class="error">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
</body>
</html>
