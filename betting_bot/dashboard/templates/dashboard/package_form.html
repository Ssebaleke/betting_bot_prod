{% extends "dashboard/base.html" %}
{% block title %}{{ action }} Package{% endblock %}
{% block nav_packages %}active{% endblock %}

{% block content %}
<div class="page-header">
  <h1>📦 {{ action }} Package</h1>
  <a href="{% url 'dashboard:packages' %}" class="btn btn-outline">← Back</a>
</div>

<div class="card" style="max-width:700px;">
  <form method="post">
    {% csrf_token %}
    <div class="form-grid">
      <div class="form-group">
        <label>Package Name</label>
        <input type="text" name="name" value="{{ pkg.name|default:'' }}" placeholder="e.g. VIP Daily" required/>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option value="">— No Category —</option>
          {% for cat in categories %}
          <option value="{{ cat.pk }}" {% if pkg.category_id == cat.pk %}selected{% endif %}>{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Price (UGX)</label>
        <input type="number" name="price" value="{{ pkg.price|default:'' }}" placeholder="5000" required/>
      </div>
      <div class="form-group">
        <label>Duration (Days)</label>
        <input type="number" name="duration_days" value="{{ pkg.duration_days|default:'' }}" placeholder="7" required/>
      </div>
      <div class="form-group">
        <label>Level (higher = premium)</label>
        <input type="number" name="level" value="{{ pkg.level|default:'1' }}" placeholder="1"/>
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea name="description" placeholder="What this package offers…">{{ pkg.description|default:'' }}</textarea>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-green">{{ action }} Package</button>
      <a href="{% url 'dashboard:packages' %}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
