services:
  db:
    image: postgres:15
    container_name: bet-bot-db
    environment:
      POSTGRES_DB: betbot
      POSTGRES_USER: betbot
      POSTGRES_PASSWORD: BetBotStrong123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: betting_bot/Docker/Dockerfile
    container_name: bet-bot-web
    command: gunicorn betting_bot.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/betting_bot
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  telegram_bot:
    build:
      context: .
      dockerfile: betting_bot/Docker/Dockerfile
    container_name: bet-bot-telegram-bot
    command: python manage.py run_telegram_bot
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/betting_bot
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:

