name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/github_actions ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd ~/betting_bot_prod

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔨 Rebuilding containers..."
            docker-compose build --no-cache

            echo "🔄 Restarting containers..."
            docker-compose up -d

            echo "⏳ Waiting for web container..."
            sleep 15

            echo "📦 Running migrations..."
            docker exec bet-bot-web python manage.py migrate --fake predictions 0003_predictiondelivery --noinput || true
            docker exec bet-bot-web python manage.py migrate --noinput

            echo "🗂️ Collecting static files..."
            docker exec bet-bot-web python manage.py collectstatic --noinput

            echo "✅ Deployment complete!"
            docker-compose ps
          EOF



