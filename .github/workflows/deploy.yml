name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/github_actions ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd ~/betting_bot_prod

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔨 Rebuilding containers..."
            docker-compose build --no-cache

            echo "🔄 Restarting containers..."
            docker-compose up -d

            echo "⏳ Waiting for web container..."
            sleep 15

            echo "📦 Running migrations..."
            docker exec bet-bot-web python manage.py migrate --fake predictions 0002_remove_prediction_confidence --noinput || true
            docker exec bet-bot-web python manage.py migrate --noinput

            echo "🗂️ Collecting static files..."
            docker exec bet-bot-web python manage.py collectstatic --noinput

            echo "🌐 Updating domain config..."
            sed -i 's/ALLOWED_HOSTS=.*/ALLOWED_HOSTS=69.164.245.17,localhost,127.0.0.1,bet.h2wrestuarantcafe.xyz,bet.kontolasports.com/' .env
            grep -q 'CSRF_TRUSTED_ORIGINS' .env && \
              sed -i 's|CSRF_TRUSTED_ORIGINS=.*|CSRF_TRUSTED_ORIGINS=https://bet.h2wrestuarantcafe.xyz,https://bet.kontolasports.com|' .env || \
              echo 'CSRF_TRUSTED_ORIGINS=https://bet.h2wrestuarantcafe.xyz,https://bet.kontolasports.com' >> .env
            sed -i 's/server_name bet\.h2wrestuarantcafe\.xyz/server_name bet.h2wrestuarantcafe.xyz bet.kontolasports.com/' /root/SpotPay-deployment/nginx.conf

            echo "✅ Deployment complete!"
            docker network connect betting_bot_prod_default spotpay-deployment-nginx-1 || true
            docker restart spotpay-deployment-nginx-1
            docker-compose ps
          EOF



